name: Daily Check

on:
  schedule:
    - cron: "0 21 * * *"  # 毎日 日本時間6:00 に実行（UTC基準のため21:00）
  workflow_dispatch:        # 手動実行ボタンも使えるようにする

permissions:
  contents: write        # ブランチへのコミットに必要
  pull-requests: write   # Pull Requestの作成・更新に必要

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run meisupo.net scraper
        run: python scripts/scrape_meisupo.py

      - name: Run big6.gr.jp scraper (硬式野球部)
        run: python scripts/scrape_big6.py

      - name: Build public calendar
        run: python scripts/build_public_calendar.py

      - name: Run missing-club check
        run: python scripts/check_missing_clubs.py
        continue-on-error: true  # チェック結果はあくまで参考情報なので、失敗しても全体を止めない

      - name: Create Pull Request for review
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update meisupo.net events data (automated)"
          title: "📅 自動データ更新 (${{ github.run_id }})"
          body: |
            明スポ(meisupo.net)から自動収集した最新データです。

            マージ前に以下を確認してください:
            - 会場や日程がおかしい行がないか(明スポ側の記事ミスの可能性あり)
            - `data/missing_clubs_report.md` に新しい「未解決の団体名」が出ていないか

            問題なければマージ、修正が必要ならこのPR上で直接編集してからマージしてください。
          branch: automated/data-update
          delete-branch: true
          labels: |
            automated-data
